<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 560px;
      padding: 32px 28px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .add-form input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus { border-color: #4f8ef7; }

    .add-form button {
      padding: 10px 20px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-form button:hover { background: #3a7ae0; }

    .filters {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      border-bottom: 2px solid #f0f2f5;
      padding-bottom: 12px;
    }

    .filters button {
      background: none;
      border: none;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.88rem;
      color: #666;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .filters button:hover { background: #f0f2f5; color: #333; }
    .filters button.active { background: #4f8ef7; color: #fff; font-weight: 600; }

    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 4px;
      border-bottom: 1px solid #f0f2f5;
      transition: background 0.1s;
    }

    .todo-item:hover { background: #fafbfc; border-radius: 6px; }
    .todo-item.done .todo-text { text-decoration: line-through; color: #aaa; }

    .check-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #d0d0d0;
      background: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }

    .todo-item.done .check-btn { background: #4f8ef7; border-color: #4f8ef7; }
    .check-btn:hover { border-color: #4f8ef7; }

    .todo-text { flex: 1; font-size: 1rem; color: #222; word-break: break-word; }

    .todo-date { font-size: 0.75rem; color: #bbb; white-space: nowrap; flex-shrink: 0; }

    .del-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .del-btn:hover { color: #e05555; background: #fff0f0; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-form { margin-top: 16px; text-align: right; }

    .clear-btn {
      background: none;
      border: 1px solid #e0c0c0;
      color: #c06060;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.83rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .clear-btn:hover { background: #fff0f0; color: #e05555; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TODO</h1>

    <div class="add-form">
      <input type="text" id="input" placeholder="タスクを入力..." autocomplete="off">
      <button onclick="addTodo()">追加</button>
    </div>

    <div class="filters">
      <button id="btn-all"    onclick="setFilter('all')">すべて</button>
      <button id="btn-active" onclick="setFilter('active')">未完了</button>
      <button id="btn-done"   onclick="setFilter('done')">完了済み</button>
    </div>

    <ul class="todo-list" id="list"></ul>

    <div class="clear-form" id="clear-wrap" style="display:none">
      <button class="clear-btn" onclick="clearDone()">完了済みをすべて削除</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function now() {
      const d = new Date();
      return d.getFullYear() + '-'
        + String(d.getMonth()+1).padStart(2,'0') + '-'
        + String(d.getDate()).padStart(2,'0') + ' '
        + String(d.getHours()).padStart(2,'0') + ':'
        + String(d.getMinutes()).padStart(2,'0');
    }

    function addTodo() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false, created_at: now() });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function del(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f) {
      filter = f;
      render();
    }

    function render() {
      const total     = todos.length;
      const remaining = todos.filter(t => !t.done).length;
      const doneCount = total - remaining;

      // フィルターボタン更新
      document.getElementById('btn-all').className    = filter === 'all'    ? 'active' : '';
      document.getElementById('btn-active').className = filter === 'active' ? 'active' : '';
      document.getElementById('btn-done').className   = filter === 'done'   ? 'active' : '';
      document.getElementById('btn-all').textContent    = `すべて (${total})`;
      document.getElementById('btn-active').textContent = `未完了 (${remaining})`;
      document.getElementById('btn-done').textContent   = `完了済み (${doneCount})`;

      // タスク一覧
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done')   return  t.done;
        return true;
      });

      const list = document.getElementById('list');
      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">タスクがありません</li>';
      } else {
        list.innerHTML = filtered.map(t => `
          <li class="todo-item ${t.done ? 'done' : ''}">
            <button class="check-btn" onclick="toggle(${t.id})">${t.done ? '✓' : ''}</button>
            <span class="todo-text">${escHtml(t.text)}</span>
            <span class="todo-date">${t.created_at}</span>
            <button class="del-btn" onclick="del(${t.id})">✕</button>
          </li>
        `).join('');
      }

      document.getElementById('clear-wrap').style.display = doneCount > 0 ? '' : 'none';
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
